- name: deleting multiple user
  hosts: all
  become: true
  gather_facts: No
  vars:
    user:
      - krishna
      - sai
  tasks:
    - name: creating multiple user
      user:
        name: "{{item}}"
        password: "{{ 'password@123' | password_hash('sha512') }}"
        shell: /bin/bash
        state: absent # by default present
        remove: yes
      loop: "{{user}}"
